# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install dependencies
      run: |
        go get google.golang.org/api/sheets/v4
        go get golang.org/x/oauth2/google
        go get github.com/spf13/viper
        go get github.com/twilio/twilio-go
        go mod tidy

    - name: Build
      run: go build -v ./...

    - name: Write Google service account credentials
      run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 -d > service_account.json

    - name: Test
      run: go test -v ./...

    - name: Run reminder script
      env:
        GOOGLE_APPLICATION_CREDENTIALS: service_account.json
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GOOGLE_SHEET_RANGE: ${{ secrets.GOOGLE_SHEET_RANGE }}
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
      run: go run .

    - name: Clean up credentials file
      if: always()
      run: rm -f service_account.json
